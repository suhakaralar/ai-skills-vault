source:
  name: marketingskills
  repository: coreyhaines31/marketingskills
  url: https://github.com/coreyhaines31/marketingskills
  license: MIT
  imported_as: external_collection
  added_to_vault: 2026-06-17

notes:
  - Product marketing skill is the foundation skill in the upstream collection.
  - Use this catalog to decide which upstream skill to install or adapt next.
  - For Cabinet, prefer installing the upstream GitHub repo directly when supported.

priority_for_suha:
  highest:
    - product-marketing
    - marketing-plan
    - customer-research
    - content-strategy
    - seo-audit
    - ai-seo
    - site-architecture
    - programmatic-seo
    - schema
    - free-tools
    - offers
    - pricing
    - cro
    - copywriting
    - ads
    - analytics
    - competitors
    - competitor-profiling
    - cold-email
    - prospecting
    - sales-enablement
  medium:
    - ad-creative
    - ab-testing
    - copy-editing
    - emails
    - lead-magnets
    - launch
    - referrals
    - co-marketing
    - directory-submissions
    - public-relations
    - social
    - image
    - video
  lower_or_contextual:
    - aso
    - churn-prevention
    - community-marketing
    - onboarding
    - paywalls
    - popups
    - revops
    - signup
    - sms

skills:
  - name: ab-testing
    group: paid_and_measurement
    use_when: A/B test, experiment design, CRO validation, growth experiment planning.
  - name: ad-creative
    group: paid_and_measurement
    use_when: Ad headlines, primary text, creative angles, visual ad concepts.
  - name: ads
    group: paid_and_measurement
    use_when: Google Ads, Meta Ads, LinkedIn Ads, campaign planning and optimization.
  - name: ai-seo
    group: seo_and_content
    use_when: AI search, LLM citations, answer engine visibility, AI-generated answers.
  - name: analytics
    group: paid_and_measurement
    use_when: GA4, tracking, attribution, event measurement, reporting quality.
  - name: aso
    group: seo_and_content
    use_when: App Store Optimization for mobile apps.
  - name: churn-prevention
    group: growth_and_retention
    use_when: Churn reduction, cancellation flows, save offers, failed payment recovery.
  - name: co-marketing
    group: growth_and_retention
    use_when: Partnership campaigns and joint marketing.
  - name: cold-email
    group: sales_and_gtm
    use_when: B2B cold outreach and follow-up sequences.
  - name: community-marketing
    group: growth_and_retention
    use_when: Online community strategy and community-led growth.
  - name: competitor-profiling
    group: sales_and_gtm
    use_when: Deep competitor profile from URLs and public research.
  - name: competitors
    group: sales_and_gtm
    use_when: Competitor alternative pages and comparison pages.
  - name: content-strategy
    group: seo_and_content
    use_when: Content roadmap, topic prioritization, topical authority.
  - name: copy-editing
    group: content_and_copy
    use_when: Improve, refresh or review existing marketing copy.
  - name: copywriting
    group: content_and_copy
    use_when: Landing page, homepage, ad, email, product and sales copy.
  - name: cro
    group: cro
    use_when: Conversion optimization for pages, forms and funnels.
  - name: customer-research
    group: strategy
    use_when: Customer interviews, pain points, voice of customer, synthesis.
  - name: directory-submissions
    group: sales_and_gtm
    use_when: Submit products to directories, startup lists, SaaS/AI directories.
  - name: emails
    group: content_and_copy
    use_when: Email sequences, lifecycle emails, automated flows.
  - name: free-tools
    group: growth_and_retention
    use_when: Free tool planning for SEO, lead gen or acquisition.
  - name: image
    group: content_and_copy
    use_when: Marketing images, blog heroes, social graphics, product visuals.
  - name: launch
    group: sales_and_gtm
    use_when: Product launch, feature announcement, release plan.
  - name: lead-magnets
    group: growth_and_retention
    use_when: Lead capture assets, downloadable resources, email growth.
  - name: marketing-ideas
    group: strategy
    use_when: Marketing ideas, campaign inspiration, growth ideas.
  - name: marketing-plan
    group: strategy
    use_when: Full marketing plan for client, company or product.
  - name: marketing-psychology
    group: strategy
    use_when: Behavioral science, mental models, persuasion and marketing psychology.
  - name: offers
    group: sales_and_gtm
    use_when: Offer design, value framing, packaging, positioning of the thing sold.
  - name: onboarding
    group: cro
    use_when: Post-signup onboarding, activation, first-run experience.
  - name: paywalls
    group: cro
    use_when: Paywalls, upgrade screens, upsell modals, feature gates.
  - name: popups
    group: cro
    use_when: Popups, modals, slide-ins and banners.
  - name: pricing
    group: sales_and_gtm
    use_when: Pricing, packaging, monetization strategy.
  - name: product-marketing
    group: strategy
    use_when: Product, audience, positioning and messaging context.
  - name: programmatic-seo
    group: seo_and_content
    use_when: SEO pages at scale using templates and data.
  - name: prospecting
    group: sales_and_gtm
    use_when: Find, qualify and build prospect lists.
  - name: public-relations
    group: sales_and_gtm
    use_when: PR, earned media, journalist outreach, media strategy.
  - name: referrals
    group: growth_and_retention
    use_when: Referral program, affiliate program, word-of-mouth loops.
  - name: revops
    group: sales_and_gtm
    use_when: Revenue operations, lifecycle, lead handoff and pipeline process.
  - name: sales-enablement
    group: sales_and_gtm
    use_when: Sales collateral, one-pagers, objection handling, demo scripts.
  - name: schema
    group: seo_and_content
    use_when: Structured data and schema markup.
  - name: seo-audit
    group: seo_and_content
    use_when: SEO audit, diagnosis, technical/content SEO review.
  - name: signup
    group: cro
    use_when: Signup, registration, trial activation.
  - name: site-architecture
    group: seo_and_content
    use_when: Website hierarchy, navigation, URL structure, internal linking.
  - name: sms
    group: content_and_copy
    use_when: SMS or MMS marketing flows.
  - name: social
    group: content_and_copy
    use_when: Social media content and scheduling for LinkedIn, X, Instagram.
  - name: video
    group: content_and_copy
    use_when: Video content planning, AI video, programmatic video frameworks.
